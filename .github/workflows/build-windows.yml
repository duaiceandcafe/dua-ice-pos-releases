name: Build Windows EXE

# Runs when you push a version tag (e.g. v1.0.0) OR manually from the Actions tab
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # allows the workflow to create a Release with the .exe

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build & publish Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run publish:win
